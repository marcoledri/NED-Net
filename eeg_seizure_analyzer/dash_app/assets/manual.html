<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NED-Net User Manual</title>
<style>
  body {
    font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    max-width: 900px;
    margin: 0 auto;
    padding: 40px 24px;
    line-height: 1.7;
    color: #1f2328;
    background: #f6f8fa;
  }
  h1 { color: #0969da; border-bottom: 2px solid #d0d7de; padding-bottom: 12px; }
  h2 { color: #0969da; margin-top: 48px; border-bottom: 1px solid #d0d7de; padding-bottom: 8px; }
  h3 { color: #1f2328; margin-top: 32px; }
  h4 { color: #656d76; margin-top: 24px; }
  a { color: #0969da; text-decoration: none; }
  a:hover { text-decoration: underline; }
  code {
    background: #e8ecf0;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 0.9em;
    font-family: 'JetBrains Mono', 'SF Mono', monospace;
  }
  pre {
    background: #1f2328;
    color: #e6edf3;
    padding: 16px 20px;
    border-radius: 8px;
    overflow-x: auto;
    font-size: 0.88em;
    line-height: 1.5;
  }
  pre code { background: none; padding: 0; color: inherit; }
  table {
    width: 100%;
    border-collapse: collapse;
    margin: 16px 0;
    font-size: 0.92em;
  }
  th, td {
    border: 1px solid #d0d7de;
    padding: 8px 12px;
    text-align: left;
  }
  th { background: #e8ecf0; font-weight: 600; }
  tr:nth-child(even) { background: #f0f2f5; }
  blockquote {
    border-left: 4px solid #0969da;
    margin: 16px 0;
    padding: 8px 16px;
    background: rgba(9, 105, 218, 0.05);
    color: #656d76;
  }
  img {
    max-width: 100%;
    border: 1px solid #d0d7de;
    border-radius: 8px;
    margin: 16px 0;
  }
  hr { border: 0; border-top: 1px solid #d0d7de; margin: 32px 0; }
  .toc { background: #ffffff; border: 1px solid #d0d7de; border-radius: 8px; padding: 20px 24px; margin: 24px 0; }
  .toc ol { padding-left: 20px; }
  .toc li { margin: 4px 0; }
  /* Screenshot placeholders */
  .screenshot-placeholder {
    display: block;
    background: #e8ecf0;
    border: 2px dashed #d0d7de;
    border-radius: 8px;
    padding: 32px;
    text-align: center;
    color: #656d76;
    font-style: italic;
    margin: 16px 0;
  }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div id="content"></div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
fetch('/assets/USER_MANUAL.md')
  .then(r => r.text())
  .then(md => {
    document.getElementById('content').innerHTML = marked.parse(md);
    // Replace broken screenshot images with styled placeholders
    document.querySelectorAll('img').forEach(img => {
      if (img.naturalWidth === 0 || img.complete === false) {
        img.onerror = function() {
          const placeholder = document.createElement('div');
          placeholder.className = 'screenshot-placeholder';
          placeholder.textContent = img.alt || 'Screenshot placeholder';
          img.replaceWith(placeholder);
        };
      }
      img.addEventListener('error', function() {
        const placeholder = document.createElement('div');
        placeholder.className = 'screenshot-placeholder';
        placeholder.textContent = img.alt || 'Screenshot placeholder';
        img.replaceWith(placeholder);
      });
    });
  });
</script>
</body>
</html>
